<!DOCTYPE html>
<html>
    <head>
        <link rel="stylesheet" href="/styles/posts.css">
        <script>
            // grab the community id from the url, e.g. /postspage/abc123 -> abc123
            const communityName = window.location.pathname.split('/').pop();

            // fetch and render all posts for this community
            async function showPosts() {
                document.getElementById('header-name').innerText = communityName
                await fetch('/posts/' + communityName)
                .then((res) => { return res.json() })
                .then((data) => {
                    var div = document.getElementById('post-list')
                    div.innerHTML = ''
                    for (var post of data) {
                        let replyHTML = ''
                        for (var reply of post.replies || []) {
                            replyHTML = `<p>${reply.user}: ${reply.message}</p>` + replyHTML
                        }
                        div.innerHTML = `
                        <div class='post-card'">
                            <h3>${post.user}: ${post.title}</h3>
                            <p>${post.content}</p>
                            <div class='replies'>
                                <form onsubmit="submitReplyForm(event, '${post._id}')">
                                    <input type="text" placeholder="Write a reply..." required>
                                    <button type="submit">Reply</button>
                                </form>
                                ${replyHTML}
                            </div>
                        </div>` + div.innerHTML
                    }
                })
                .catch((error) => { console.log(error) })
            }

            async function submitReplyForm(e, postId) {
                e.preventDefault()
                const input = e.target.querySelector('input')  // fixed
                await fetch('/posts/createReply', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        postId: postId,
                        message: input.value.trim()
                    })
                })
                .catch((error) => { console.log(error) })
                showPosts()
            }
            

            // show the create post popup
            function openForm() {
                document.getElementById('popup').style.display = 'block'
                document.getElementById('form-error').textContent = ''
            }

            // submit new post to the server
            async function submitForm(e) {
                e.preventDefault()
                const res = await fetch('/posts/create', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        title: document.getElementById('title').value.trim(),
                        content: document.getElementById('content').value.trim(),
                        communityId: communityName
                    })
                })
                const data = await res.json()
                if (data.error) {
                    document.getElementById('form-error').textContent = data.error
                } else {
                    closeForm()
                }
            }

            // hide the popup and refresh the post list
            function closeForm() {
                showPosts()
                document.getElementById('popup').style.display = 'none'
            }
        </script>
    </head>
    <body onload="showPosts()">
        <nav>
            <div id="nav-links"></div>
        </nav>

        <div id="header">
            <h1 id="header-name"></h1>
            <button onclick="openForm()">Create Post</button>
        </div>

        <!-- popup form to create a new post -->
        <div id="popup" style="display: none;">
            <form onsubmit="submitForm(event)">
                <label>
                    Title:
                    <input type="text" id="title" required placeholder="Post Title">
                    <br>
                </label>
                <label>
                    Content:
                    <input type="text" id="content" placeholder="Content">
                    <br>
                </label>
                <p id="form-error" style="color: red;"></p>
                <button type="submit">Submit</button>
            </form>
        </div>

        <!-- post cards are injected here by showPosts() -->
        <div id="post-list"></div>

        <script src="../scripts/navbar.js"></script>
    </body>
</html>
