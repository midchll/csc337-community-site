<!DOCTYPE html>
<html>
    <head>
        <link rel="stylesheet" href="/styles/communities.css">
        <script>

            //show all communities in the list
            async function showCommunities() {
                await fetch('/communities')
                .then((res) => {return res.json()})
                .then((data) => {
                    var div = document.getElementById('community-list')
                    div.innerHTML = ''
                    for(var community of data){
                        div.innerHTML = `<div class='community-card' onclick="openCommunity('${community.name}')"><div class='community-name'><h3>${community.name}</h3></div><div class='community-description'><p>${community.description}</p></div></div>` + div.innerHTML
                    }
                })
                .catch((error) => {console.log(error)})
            }

            //
            async function openCommunity(name) {
                window.location.href = `/postspage/${name}`
            }

            //Display pop up form
            function openForm() {
                document.getElementById("popup").style.display = "block"
                document.getElementById('form-error').textContent = ''
            }

            //submit the form and load new communities
            async function submitForm(e){
                e.preventDefault()
                const res = await fetch('/communities/create',{
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        name: document.getElementById('name').value.trim(),
                        description: document.getElementById('description').value.trim()
                    })
                })
                const data = await res.json()
                if (data.error) {
                    document.getElementById('form-error').textContent = data.error
                } else {
                    closeForm();
                }
            }

            //close the form
            function closeForm() {
                showCommunities();
                document.getElementById('popup').style.display = 'none';
            }
        </script>
    </head>
    <body onload="showCommunities()">

        <nav>
            <div id="nav-links"></div>
        </nav>

        <div>
        <div id="header">
            <h1>Communities R Us</h1>
            <button id="community-button" onclick="openForm()">Create Community</button>
        </div>

        <!--Pop up form to make community-->
        <div id="popup" style="display: none;">
            <form onsubmit="submitForm(event)">
                <label class="community-label">
                    Name:
                    <input name="name" type="text" id="name" required placeholder="Community Name">
                    <br>
                </label>
                <label class="community-label">
                    Description
                    <input type="text" name="description" id="description" placeholder="Description">
                    <br>
                </label>
                <p id="form-error" style="color: red;"></p>
                <button type="submit">Submit</button>
            </form>
        </div>

        <!--List of all communities-->


        <div id="community-list"></div>

        <script src="../scripts/navbar.js"></script>
    </body>
</html>
